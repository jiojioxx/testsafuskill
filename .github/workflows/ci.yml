name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  backend:
    name: Backend (Type Check + Tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        working-directory: packages/backend
        run: npx prisma generate

      - name: Type check
        working-directory: packages/backend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: packages/backend
        run: npm test

  frontend:
    name: Frontend (Type Check + Tests + Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        working-directory: packages/backend
        run: npx prisma generate

      - name: Type check
        working-directory: packages/frontend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: packages/frontend
        run: npm test

      - name: Build
        working-directory: packages/frontend
        run: npm run build
